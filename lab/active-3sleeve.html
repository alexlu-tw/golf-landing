var chart=LightweightCharts.createChart(document.getElementById('c'),{
  autoSize:true,
  layout:{background:{color:'#fff'},textColor:'#333',fontSize:11},
  grid:{vertLines:{color:'#f2f2f2'},horzLines:{color:'#f2f2f2'}},
  rightPriceScale:{borderColor:'#dcdfe4'},
  timeScale:{visible:true,borderColor:'#dcdfe4',rightOffset:3,
             fixLeftEdge:true,fixRightEdge:true,timeVisible:false,secondsVisible:false},
  crosshair:{mode:1},
  handleScale:{axisPressedMouseMove:{time:true,price:true}},
  localization:{locale:'zh-Hant'},
});
var all=[];
SEGS.forEach(function(s){
  var ls=chart.addLineSeries({color:s.color,lineWidth:2,lineStyle:s.style,
    priceLineVisible:false,lastValueVisible:false});
  ls.setData(s.data);
  if(s.marker){ls.setMarkers([s.marker]);}   // per-segment return label
  all.push(ls);
});
chart.timeScale().fitContent();
var hdr=document.getElementById('hdr');
function fmtTime(t){ if(t==null)return'';
  if(typeof t==='object')return t.year+'-'+('0'+t.month).slice(-2)+'-'+('0'+t.day).slice(-2);
  return String(t); }
function legend(extra){
  var h='<div class="t">'+TITLE+(extra?'<span class="d">'+extra+'</span>':'')+'</div>';
  LEG.forEach(function(l){
    var sw=l.dash
      ?'<span class="sw" style="background:repeating-linear-gradient(90deg,'
        +l.color+' 0 4px,transparent 4px 7px)"></span>'
      :'<span class="sw" style="background:'+l.color+'"></span>';
    h+='<div class="row">'+sw+l.label+'</div>';
  });
  hdr.innerHTML=h;
}
legend('');
chart.subscribeCrosshairMove(function(p){
  if(!p||!p.time){legend('');return;}
  var val=null;
  for(var i=0;i<all.length;i++){var d=p.seriesData.get(all[i]); if(d){val=d.value;break;}}
  legend(fmtTime(p.time)+(val!=null?'　'+val.toFixed(1):''));
});
