chart.subscribeCrosshairMove(function(p){
  if(!p||!p.time){legend('');return;}
  var c='';
  if(spy){var d=p.seriesData.get(spy); if(d&&d.close!=null)c=d.close.toFixed(1);}
  else{for(var i=0;i<segRefs.length;i++){var d=p.seriesData.get(segRefs[i]);
        if(d&&d.value!=null){c=d.value.toFixed(1);break;}}}
  var rv=p.seriesData.get(rsi); var rr=(rv&&rv.value!=null)?'　RSI2 '+rv.value.toFixed(0):'';
  legend(fmtTime(p.time)+(c?'　SPY '+c:'')+rr);
});

</script></body></html>
